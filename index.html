<!DOCTYPE html>
<html>
<head>
<title>WinGo Game</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#111;
color:white;
}

.header{
background:red;
padding:15px;
font-size:22px;
}

.wallet{
background:#222;
padding:10px;
margin:10px;
border-radius:10px;
}

.timer{
font-size:22px;
color:yellow;
}

button{
padding:10px 20px;
margin:5px;
border:none;
border-radius:6px;
color:white;
}

.green{background:green;}
.red{background:red;}
.violet{background:purple;}

.numbers{
display:grid;
grid-template-columns:repeat(5,60px);
gap:10px;
justify-content:center;
margin-top:20px;
}

.num{
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:18px;
cursor:pointer;
}

.greenNum{background:green;}
.redNum{background:red;}

.half{
background:linear-gradient(90deg,red 50%,green 50%);
}

.history{
margin-top:20px;
background:#222;
padding:10px;
border-radius:10px;
}

.admin{
display:none;
background:black;
padding:20px;
margin-top:20px;
}

</style>

</head>

<body>

<div class="header" onclick="secretAdmin()">
WinGo 30s Game
</div>

<div class="wallet">

Wallet ₹<span id="wallet">200</span>

<div class="timer">
Time: <span id="time">30</span>
</div>

</div>

Bet Amount
<input type="number" id="amount" value="10">

<br><br>

<button class="green" onclick="betColor('Green')">Green</button>
<button class="violet" onclick="betColor('Violet')">Violet</button>
<button class="red" onclick="betColor('Red')">Red</button>

<br>

<button class="green" onclick="betSize('Big')">Big</button>
<button class="red" onclick="betSize('Small')">Small</button>

<div class="numbers">

<div class="num half" onclick="betNumber(0)">0</div>
<div class="num greenNum" onclick="betNumber(1)">1</div>
<div class="num redNum" onclick="betNumber(2)">2</div>
<div class="num greenNum" onclick="betNumber(3)">3</div>
<div class="num redNum" onclick="betNumber(4)">4</div>
<div class="num half" onclick="betNumber(5)">5</div>
<div class="num redNum" onclick="betNumber(6)">6</div>
<div class="num greenNum" onclick="betNumber(7)">7</div>
<div class="num redNum" onclick="betNumber(8)">8</div>
<div class="num greenNum" onclick="betNumber(9)">9</div>

</div>

<h2 id="result"></h2>

<div class="history">

<h3>Game History</h3>

<ul id="history"></ul>

</div>

<div class="admin" id="adminPanel">

<h3>Admin Panel</h3>

<button onclick="setAdminColor('Green')" class="green">Green</button>
<button onclick="setAdminColor('Red')" class="red">Red</button>
<button onclick="setAdminColor('Violet')" class="violet">Violet</button>

<br><br>

<input type="number" id="adminNumber" placeholder="Number 0-9">

<button onclick="setAdminNumber()">Set Number</button>

</div>

<script>

let wallet=200
let time=30

let betColorValue=""
let betNumberValue=""
let betSizeValue=""

let tapCount=0

function secretAdmin(){

tapCount++

if(tapCount==5){

let pass=prompt("Enter Admin Password")

if(pass=="admin123"){
document.getElementById("adminPanel").style.display="block"
}

tapCount=0

}

}

function betColor(color){
betColorValue=color
alert("Bet on "+color)
}

function betNumber(num){
betNumberValue=num
alert("Bet on number "+num)
}

function betSize(size){
betSizeValue=size
alert("Bet on "+size)
}

function setAdminColor(color){
localStorage.setItem("adminColor",color)
}

function setAdminNumber(){
let num=document.getElementById("adminNumber").value
localStorage.setItem("adminNumber",num)
}

setInterval(()=>{

time--
document.getElementById("time").innerText=time

if(time==0){

let num=localStorage.getItem("adminNumber")

if(num==null){
num=Math.floor(Math.random()*10)
}else{
num=parseInt(num)
localStorage.removeItem("adminNumber")
}

let color=localStorage.getItem("adminColor")

if(!color){

if(num==0 || num==5){
color="Violet"
}
else if(num%2==0){
color="Red"
}
else{
color="Green"
}

}else{
localStorage.removeItem("adminColor")
}

let size=(num>=5)?"Big":"Small"

document.getElementById("result").innerText="Result: "+num+" "+color

let amount=parseInt(document.getElementById("amount").value)

let win=false

if(betNumberValue==num) win=true
if(betColorValue==color) win=true
if(betSizeValue==size) win=true

if(win){
wallet+=amount*2
}else{
wallet-=amount
}

document.getElementById("wallet").innerText=wallet

let history=document.getElementById("history")

let li=document.createElement("li")

li.innerText=num+" "+color

history.prepend(li)

time=30
betColorValue=""
betNumberValue=""
betSizeValue=""

}

},1000)

</script>

</body>
  </html>
